# =============================================================================
#  Terraform Deploy Pipeline
# =============================================================================
#  Multi-stage pipeline: Init → Plan (commit) → Approval → Apply
#
#  Prerequisites:
#    1. Configure Azure OIDC federated credentials for GitHub Actions.
#    2. Set repository secrets:
#         AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#    3. (Optional) Set a TF_VARS secret containing terraform.tfvars content.
#    4. Create a "production" environment in repo Settings → Environments
#       and add required reviewers for the approval gate.
#    5. Enable a remote backend in versions.tf (e.g. azurerm backend).
# =============================================================================

name: 'Terraform Deploy'

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: terraform-deploy
  cancel-in-progress: false          # never cancel an in-progress deploy

env:
  TF_VERSION: '~> 1.9'
  ARM_USE_OIDC: 'true'

# =============================================================================
jobs:

  # ─── Stage 1 ── Terraform Init ─────────────────────────────────────────────
  init:
    name: '🔧 Terraform Init'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (Upgrade)
        run: terraform init -upgrade -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Cache Terraform Working Directory
        uses: actions/cache/save@v4
        with:
          path: |
            .terraform
            .terraform.lock.hcl
          key: terraform-${{ github.run_id }}

  # ─── Stage 2 ── Terraform Plan ─────────────────────────────────────────────
  plan:
    name: '📋 Terraform Plan'
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false   # avoid wrapper interference with plan output

      - name: Restore Terraform Working Directory
        uses: actions/cache/restore@v4
        with:
          path: |
            .terraform
            .terraform.lock.hcl
          key: terraform-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Write Terraform Variables
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: |
          if [ -n "$TF_VARS" ]; then
            echo "$TF_VARS" > terraform.auto.tfvars
            echo "Wrote terraform.auto.tfvars from TF_VARS secret"
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan -input=false -no-color 2>&1 | tee plan-output.txt
          terraform show -no-color tfplan > tfplan-readable.txt

      - name: Plan Summary
        run: |
          {
            echo '## 📋 Terraform Plan'
            echo ''
            echo '<details><summary>Show Plan</summary>'
            echo ''
            echo '```hcl'
            head -c 65000 tfplan-readable.txt
            echo ''
            echo '```'
            echo ''
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit Plan to Repository
        run: |
          PLAN_FILE="plans/plan-$(date -u +%Y%m%dT%H%M%SZ)-run-${{ github.run_id }}.txt"
          mkdir -p plans
          cp tfplan-readable.txt "$PLAN_FILE"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plans/
          git diff --cached --quiet && echo "No plan changes to commit" || \
            (git commit -m "chore: terraform plan output for run #${{ github.run_id }} [skip ci]" && git push)

      - name: Upload Plan (binary)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 5

      - name: Upload Plan (readable)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-readable
          path: tfplan-readable.txt
          retention-days: 30

  # ─── Stage 3 ── Approval Gate ──────────────────────────────────────────────
  approve:
    name: '✅ Approval'
    needs: plan
    runs-on: ubuntu-latest
    environment: production        # ← configure required reviewers here
    steps:
      - name: Deployment Approved
        run: echo "✅ Deployment approved – proceeding to apply."

  # ─── Stage 4 ── Terraform Apply ────────────────────────────────────────────
  apply:
    name: '🚀 Terraform Apply'
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Restore Terraform Working Directory
        uses: actions/cache/restore@v4
        with:
          path: |
            .terraform
            .terraform.lock.hcl
          key: terraform-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Write Terraform Variables
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: |
          if [ -n "$TF_VARS" ]; then
            echo "$TF_VARS" > terraform.auto.tfvars
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Apply Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo '## 🚀 Terraform Apply — ✅ Success' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '## 🚀 Terraform Apply — ❌ Failed' >> "$GITHUB_STEP_SUMMARY"
          fi
